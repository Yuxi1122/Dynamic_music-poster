<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青春活力音乐唱片海报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            padding: 20px;
        }

        .poster {
            width: 600px;
            height: 850px;
            background: linear-gradient(180deg, 
                #4a90e2 0%, 
                #7b68ee 25%, 
                #9b59b6 50%, 
                #e91e63 75%, 
                #ff6b6b 100%);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 60px rgba(155, 89, 182, 0.5),
                0 0 120px rgba(74, 144, 226, 0.3),
                0 25px 50px rgba(0, 0, 0, 0.4);
        }

        /* 星光效果 */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* 大星星闪光 */
        .star-glow {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, white 0%, transparent 70%);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(2); }
        }

        /* 音符元素 */
        .music-notes {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .note {
            position: absolute;
            font-size: 40px;
            color: rgba(255, 255, 255, 0.6);
            animation: float 4s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* 唱片主体 */
        .vinyl-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
        }

        .vinyl {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: 
                radial-gradient(circle at center, 
                    #1a1a2e 0%, 
                    #1a1a2e 15%,
                    transparent 15.5%,
                    #2d2d44 16%,
                    #2d2d44 18%,
                    transparent 18.5%,
                    #1a1a2e 19%,
                    #1a1a2e 100%);
            box-shadow: 
                0 0 0 3px rgba(255, 255, 255, 0.1),
                inset 0 0 50px rgba(0, 0, 0, 0.5),
                0 10px 30px rgba(0, 0, 0, 0.4);
            animation: spin 8s linear infinite;
            position: relative;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .vinyl::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 
                inset 0 0 20px rgba(255, 255, 255, 0.3),
                0 0 30px rgba(102, 126, 234, 0.5);
        }

        .vinyl::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #1a1a2e;
            box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.2);
        }

        /* 唱片纹路 */
        .grooves {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle at center,
                transparent 0px,
                transparent 2px,
                rgba(0, 0, 0, 0.3) 2px,
                rgba(0, 0, 0, 0.3) 3px
            );
            animation: spin 8s linear infinite;
        }

        /* 标题区域 */
        .title-area {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        .main-title {
            font-size: 42px;
            font-weight: bold;
            color: white;
            text-shadow: 
                0 0 20px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(155, 89, 182, 0.6),
                0 4px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        .sub-title {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 底部信息 */
        .info-area {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            width: 80%;
        }

        .artist-name {
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            margin-bottom: 15px;
        }

        .album-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .info-tag {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .release-date {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
        }

        /* 装饰线条 */
        .deco-line {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.8), 
                transparent);
        }

        /* 光晕效果 */
        .halo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, 
                rgba(155, 89, 182, 0.3) 0%, 
                transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        /* 音波效果 */
        .sound-wave {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            align-items: flex-end;
        }

        .wave-bar {
            width: 4px;
            background: linear-gradient(to top, #fff, rgba(255, 255, 255, 0.3));
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }
    </style>
</head>
<body>
    <div class="poster">
        <!-- 光晕 -->
        <div class="halo"></div>

        <!-- 星光 -->
        <div class="stars">
            <div class="star" style="top: 10%; left: 15%; width: 3px; height: 3px; animation-delay: 0s;"></div>
            <div class="star" style="top: 20%; left: 80%; width: 2px; height: 2px; animation-delay: 0.5s;"></div>
            <div class="star" style="top: 15%; left: 50%; width: 4px; height: 4px; animation-delay: 1s;"></div>
            <div class="star" style="top: 30%; left: 10%; width: 2px; height: 2px; animation-delay: 1.5s;"></div>
            <div class="star" style="top: 25%; left: 90%; width: 3px; height: 3px; animation-delay: 0.3s;"></div>
            <div class="star" style="top: 70%; left: 5%; width: 2px; height: 2px; animation-delay: 0.8s;"></div>
            <div class="star" style="top: 80%; left: 85%; width: 3px; height: 3px; animation-delay: 1.2s;"></div>
            <div class="star" style="top: 85%; left: 20%; width: 2px; height: 2px; animation-delay: 0.6s;"></div>
            <div class="star-glow" style="top: 8%; left: 75%; animation-delay: 0s;"></div>
            <div class="star-glow" style="top: 65%; left: 8%; animation-delay: 1.5s;"></div>
        </div>

        <!-- 音符 -->
        <div class="music-notes">
            <div class="note" style="top: 25%; left: 8%; animation-delay: 0s;">♪</div>
            <div class="note" style="top: 20%; right: 10%; animation-delay: 1s;">♫</div>
            <div class="note" style="top: 60%; left: 5%; animation-delay: 0.5s;">♬</div>
            <div class="note" style="top: 70%; right: 8%; animation-delay: 1.5s;">♩</div>
            <div class="note" style="top: 75%; left: 15%; animation-delay: 2s; font-size: 30px;">♪</div>
            <div class="note" style="top: 30%; right: 5%; animation-delay: 0.8s; font-size: 35px;">♫</div>
        </div>

        <!-- 标题 -->
        <div class="title-area">
            <div class="main-title">青春乐章</div>
            <div class="sub-title">Youth Melody Collection</div>
        </div>

        <!-- 唱片 -->
        <div class="vinyl-container">
            <div class="vinyl">
                <div class="grooves"></div>
            </div>
        </div>

        <!-- 音波 -->
        <div class="sound-wave">
            <div class="wave-bar" style="animation-delay: 0s;"></div>
            <div class="wave-bar" style="animation-delay: 0.1s;"></div>
            <div class="wave-bar" style="animation-delay: 0.2s;"></div>
            <div class="wave-bar" style="animation-delay: 0.3s;"></div>
            <div class="wave-bar" style="animation-delay: 0.4s;"></div>
            <div class="wave-bar" style="animation-delay: 0.5s;"></div>
            <div class="wave-bar" style="animation-delay: 0.6s;"></div>
            <div class="wave-bar" style="animation-delay: 0.7s;"></div>
            <div class="wave-bar" style="animation-delay: 0.8s;"></div>
            <div class="wave-bar" style="animation-delay: 0.9s;"></div>
        </div>

        <!-- 装饰线 -->
        <div class="deco-line"></div>

        <!-- 底部信息 -->
        <div class="info-area">
            <div class="artist-name">梦想乐团 Dream Band</div>
            <div class="album-info">
                <span class="info-tag">限量珍藏版</span>
                <span class="info-tag">Hi-Res音质</span>
                <span class="info-tag">黑胶复刻</span>
            </div>
            <div class="release-date">2026 · SPRING RELEASE</div>
        </div>
    </div>
</body>
</html>
